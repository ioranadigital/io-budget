name: Security Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

      - name: Check for exposed credentials
        run: |
          # Scan for common patterns
          if grep -r "SUPABASE_KEY\|SERP_API_KEY\|SMTP_PASS" --include="*.env" --include="*.yml" --include="*.yaml" .; then
            echo "❌ Found exposed credentials in config files!"
            exit 1
          fi
          echo "✅ No obvious credentials found"
        continue-on-error: true

      - name: Verify .env in .gitignore
        run: |
          if ! grep -q "^\.env$" .gitignore; then
            echo "❌ .env is not in .gitignore!"
            exit 1
          fi
          echo "✅ .env is properly in .gitignore"
